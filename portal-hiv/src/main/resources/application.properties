# ============================================================
# PORTAL HIV/AIDS - Configurações da Aplicação
# ============================================================

# Servidor
server.port=8080
spring.application.name=portal-hiv

# ============================================================
# BANCO DE DADOS MySQL
# Ajuste as credenciais conforme seu ambiente local
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/portal_hiv?useSSL=false&serverTimezone=America/Sao_Paulo&characterEncoding=utf8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de conexões
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================================
# THYMELEAF
# ============================================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ============================================================
# API ANTHROPIC (Claude)
# IMPORTANTE: Substitua pela sua chave real em
# https://console.anthropic.com
# ============================================================
anthropic.api.key=SUA_CHAVE_ANTHROPIC_AQUI
anthropic.api.url=https://api.anthropic.com/v1/messages
anthropic.api.model=claude-haiku-4-5-20251001
anthropic.api.max-tokens=600

# ============================================================
# LOGGING
# ============================================================
logging.level.com.portalhiv=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

# ============================================================
# JACKSON
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Sao_Paulo
